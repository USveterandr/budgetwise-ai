version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - '3001:3001'
    volumes:
      - ./server:/app/server
    working_dir: /app/server
    command: node server.js
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - '3000:3000'
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  budgetwise-network:
    driver: bridge