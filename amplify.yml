version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd budgetwise-app/client
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: budgetwise-app/client/build
    files:
      - '**/*'
  cache:
    paths:
      - budgetwise-app/client/node_modules/**/*
      - budgetwise-app/client/.npm/**/*