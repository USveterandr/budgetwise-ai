name = "budgetwise-api"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "users"
database_name = "budgetwise_db"
database_id = "budgetwise_db"

[[r2_buckets]]
binding = "budgetwise_storage"
bucket_name = "budgetwise-assets"

[ai]
binding = "AI"

[vars]
JWT_ISSUER = "budgetwise.ai"
JWT_AUDIENCE = "budgetwise-users"
HUBSPOT_TOKEN = ""

# WARNING: JWT_SECRET was removed from here because it was exposed in build logs.
# Add it as a Secret in Cloudflare Dashboard → Pages → Settings → Environment variables.
# JWT_SECRET should NEVER be in version control.