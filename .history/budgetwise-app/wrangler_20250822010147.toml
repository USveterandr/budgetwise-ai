[assets]
directory = "./client/build"

[build]
upload
  format = "modules"
  main = "./client/build/index.html"
  rules = [
    { glob = "*.js", type = "Module" },
    { glob = "*.css", type = "Text" },
    { glob = "*.html", type = "Text" },
