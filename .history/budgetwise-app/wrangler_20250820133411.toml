name = "budgetwise-api"
compatibility_date = "2025-08-16"

[build]
command = "npm run build"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging" }

[observability]
enabled = true

# AI model binding
[[ai.bindings]]
binding = "RECEIPT_PROCESSOR"
model = "@cf/llm-api"

[[d1_databases]]
binding = "DB"
database_name = "budgetwise_prod"
database_id = "your-d1-id"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "budgetwise-receipts"