name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  deploy-client:
    name: Deploy Client to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Client
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: budgetwise-client
          directory: ./budgetwise-app/client/build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-server:
    name: Deploy Server Functions to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: budgetwise-app/package-lock.json

      - name: Install Server Dependencies
        working-directory: ./budgetwise-app
        run: npm ci

      - name: Deploy Server Functions
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production